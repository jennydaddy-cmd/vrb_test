<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VRB 프로젝트 현황 관리</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f0f2fc;
    --surface: #ffffff;
    --surface2: #f7f8ff;
    --border: #e2e6f3;
    --border2: #d0d5ee;
    --text-primary: #1a1f3c;
    --text-secondary: #4a5080;
    --text-muted: #8b91b5;
    --accent: #3b5bdb;
    --accent-light: #e8edff;
    --accent-hover: #2f4ac7;
    --success: #2f9e44;
    --success-light: #ebfbee;
    --warning: #e67700;
    --warning-light: #fff3cd;
    --danger: #c92a2a;
    --danger-light: #ffe0e0;
    --info: #1971c2;
    --info-light: #e7f5ff;
    --shadow-sm: 0 1px 3px rgba(59,91,219,0.07), 0 1px 2px rgba(0,0,0,0.04);
    --shadow-md: 0 4px 16px rgba(59,91,219,0.10), 0 2px 6px rgba(0,0,0,0.05);
    --shadow-lg: 0 12px 40px rgba(59,91,219,0.15), 0 4px 12px rgba(0,0,0,0.07);
    --radius: 10px;
    --radius-sm: 6px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--bg);
    color: var(--text-primary);
    font-size: 15px;
    min-height: 100vh;
  }
  /* HEADER */
  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 32px;
    height: 60px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: var(--shadow-sm);
  }
  .header-logo { display: flex; align-items: center; gap: 10px; }
  .header-logo-badge {
    background: var(--accent);
    color: #fff;
    font-family: 'JetBrains Mono', monospace;
    font-weight: 600;
    font-size: 13px;
    padding: 4px 10px;
    border-radius: 6px;
    letter-spacing: 1px;
  }
  .header-title { font-size: 16px; font-weight: 700; color: var(--text-primary); letter-spacing: -0.3px; }
  .header-date { font-size: 13px; color: var(--text-muted); }
  /* MAIN */
  .main { padding: 28px 32px; max-width: 1600px; margin: 0 auto; }
  /* STAT CARDS */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 14px;
    margin-bottom: 24px;
  }
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 18px;
    cursor: pointer;
    transition: all 0.18s ease;
    box-shadow: var(--shadow-sm);
  }
  .stat-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); border-color: var(--accent); }
  .stat-card.active { border-color: var(--accent); background: var(--accent-light); box-shadow: var(--shadow-md); }
  .stat-label { font-size: 12px; color: var(--text-muted); font-weight: 500; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
  .stat-value { font-size: 26px; font-weight: 700; color: var(--text-primary); font-family: 'JetBrains Mono', monospace; }
  .stat-card.active .stat-value { color: var(--accent); }
  /* TOOLBAR */
  .toolbar {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 20px;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
    box-shadow: var(--shadow-sm);
  }
  .search-wrap { position: relative; flex: 1; min-width: 220px; }
  .search-wrap svg { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); color: var(--text-muted); }
  .search-input {
    width: 100%;
    padding: 9px 12px 9px 36px;
    border: 1px solid var(--border2);
    border-radius: var(--radius-sm);
    font-size: 14px;
    font-family: 'Noto Sans KR', sans-serif;
    color: var(--text-primary);
    background: var(--surface2);
    transition: border-color 0.15s;
    outline: none;
  }
  .search-input:focus { border-color: var(--accent); background: #fff; }
  select.filter-select {
    padding: 9px 12px;
    border: 1px solid var(--border2);
    border-radius: var(--radius-sm);
    font-size: 14px;
    font-family: 'Noto Sans KR', sans-serif;
    color: var(--text-primary);
    background: var(--surface2);
    outline: none;
    cursor: pointer;
    transition: border-color 0.15s;
    min-width: 130px;
  }
  select.filter-select:focus { border-color: var(--accent); }
  .btn {
    padding: 9px 18px;
    border-radius: var(--radius-sm);
    font-size: 14px;
    font-family: 'Noto Sans KR', sans-serif;
    font-weight: 600;
    cursor: pointer;
    border: none;
    transition: all 0.15s;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    white-space: nowrap;
  }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: var(--accent-hover); transform: translateY(-1px); box-shadow: 0 4px 12px rgba(59,91,219,0.3); }
  .btn-secondary { background: var(--surface2); color: var(--text-secondary); border: 1px solid var(--border2); }
  .btn-secondary:hover { background: var(--accent-light); color: var(--accent); border-color: var(--accent); }
  .btn-success { background: var(--success); color: #fff; }
  .btn-success:hover { background: #26803a; transform: translateY(-1px); }
  .btn-danger { background: var(--danger); color: #fff; }
  .btn-danger:hover { background: #a82222; transform: translateY(-1px); }
  .btn-warning { background: var(--warning); color: #fff; }
  .btn-warning:hover { background: #c45e00; transform: translateY(-1px); }
  /* SORT */
  thead th.sortable { cursor: pointer; user-select: none; }
  thead th.sortable:hover { background: var(--accent-light); color: var(--accent); }
  thead th.sort-active { color: var(--accent); background: var(--accent-light); }
  .sort-icon { display: inline-flex; flex-direction: column; margin-left: 5px; vertical-align: middle; gap: 1px; }
  .sort-icon .arrow-up, .sort-icon .arrow-down {
    width: 0; height: 0; border-left: 4px solid transparent; border-right: 4px solid transparent; opacity: 0.3;
  }
  .sort-icon .arrow-up { border-bottom: 5px solid currentColor; }
  .sort-icon .arrow-down { border-top: 5px solid currentColor; }
  thead th.sort-active.sort-asc .arrow-up { opacity: 1; }
  thead th.sort-active.sort-desc .arrow-down { opacity: 1; }
  /* TABLE */
  .table-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow-sm);
    overflow: hidden;
  }
  .table-header {
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--surface2);
  }
  .table-count { font-size: 14px; color: var(--text-secondary); }
  .table-count strong { color: var(--accent); font-weight: 700; }
  .table-scroll { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; }
  thead th {
    background: var(--surface2);
    padding: 11px 14px;
    text-align: left;
    font-size: 12px;
    font-weight: 700;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.6px;
    border-bottom: 2px solid var(--border2);
    white-space: nowrap;
  }
  tbody tr { border-bottom: 1px solid var(--border); transition: background 0.12s; }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: var(--accent-light); }
  tbody td { padding: 11px 14px; font-size: 14px; color: var(--text-primary); vertical-align: middle; }
  .code-badge {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    font-weight: 600;
    background: var(--accent-light);
    color: var(--accent);
    padding: 3px 8px;
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
    display: inline-block;
  }
  .code-badge:hover { background: var(--accent); color: #fff; }
  .project-name-link {
    color: var(--text-primary);
    cursor: pointer;
    font-weight: 500;
    transition: color 0.15s;
    font-size: 14px;
  }
  .project-name-link:hover { color: var(--accent); text-decoration: underline; }
  /* STATUS BADGES */
  .badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 12px; font-weight: 600; white-space: nowrap; }
  .badge-가결 { background: var(--success-light); color: var(--success); }
  .badge-부결 { background: var(--danger-light); color: var(--danger); }
  .badge-조건부 { background: var(--warning-light); color: var(--warning); }
  .badge-보류 { background: #f3f0ff; color: #7048e8; }
  .badge-미정 { background: #f1f3f5; color: #868e96; }
  .badge-사전 { background: #e3fafc; color: #0c8599; }
  .badge-제안 { background: #fff0f6; color: #c2255c; }
  /* DATE */
  .date-text { font-size: 13px; color: var(--text-secondary); white-space: nowrap; font-family: 'JetBrains Mono', monospace; }
  /* ACTION BUTTONS */
  .action-btn {
    padding: 5px 11px;
    border-radius: 5px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    border: 1px solid transparent;
    transition: all 0.13s;
    font-family: 'Noto Sans KR', sans-serif;
  }
  .action-edit { background: var(--accent-light); color: var(--accent); border-color: #c5d0fa; }
  .action-edit:hover { background: var(--accent); color: #fff; }
  /* MODAL */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(20,25,60,0.35);
    backdrop-filter: blur(4px);
    z-index: 200;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s;
  }
  .modal-overlay.open { opacity: 1; pointer-events: all; }
  .modal {
    background: var(--surface);
    border-radius: 14px;
    box-shadow: var(--shadow-lg);
    width: 100%;
    max-width: 580px;
    max-height: 90vh;
    overflow-y: auto;
    transform: translateY(20px);
    transition: transform 0.2s;
  }
  .modal-overlay.open .modal { transform: translateY(0); }
  .modal-header {
    padding: 22px 26px 18px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .modal-title { font-size: 17px; font-weight: 700; color: var(--text-primary); }
  .modal-close {
    width: 32px; height: 32px;
    border-radius: 8px;
    border: none;
    background: var(--surface2);
    color: var(--text-muted);
    cursor: pointer;
    font-size: 18px;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.13s;
  }
  .modal-close:hover { background: var(--danger-light); color: var(--danger); }
  .modal-body { padding: 22px 26px; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
  .form-row.full { grid-template-columns: 1fr; }
  .form-group { display: flex; flex-direction: column; gap: 6px; }
  .form-label { font-size: 13px; font-weight: 600; color: var(--text-secondary); }
  .form-control {
    padding: 9px 12px;
    border: 1px solid var(--border2);
    border-radius: var(--radius-sm);
    font-size: 14px;
    font-family: 'Noto Sans KR', sans-serif;
    color: var(--text-primary);
    background: var(--surface2);
    outline: none;
    transition: border-color 0.15s;
  }
  .form-control:focus { border-color: var(--accent); background: #fff; }
  textarea.form-control { resize: vertical; min-height: 80px; }
  .modal-footer {
    padding: 16px 26px 22px;
    display: flex;
    justify-content: flex-end;
    gap: 10px;
    border-top: 1px solid var(--border);
  }
  /* DETAIL MODAL */
  .detail-modal { max-width: 640px; }
  .detail-hero {
    background: linear-gradient(135deg, #3b5bdb 0%, #2f4ac7 100%);
    padding: 26px 28px 22px;
    border-radius: 14px 14px 0 0;
    color: #fff;
  }
  .detail-hero-code {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    font-weight: 600;
    background: rgba(255,255,255,0.18);
    color: #fff;
    padding: 3px 10px;
    border-radius: 4px;
    display: inline-block;
    margin-bottom: 10px;
    letter-spacing: 1px;
  }
  .detail-hero-title { font-size: 19px; font-weight: 700; line-height: 1.4; margin-bottom: 14px; }
  .detail-hero-badges { display: flex; gap: 8px; flex-wrap: wrap; }
  .detail-hero-badge { background: rgba(255,255,255,0.2); color: #fff; padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; }
  .detail-body { padding: 24px 28px; }
  .detail-section-title {
    font-size: 11px; font-weight: 700; color: var(--text-muted);
    text-transform: uppercase; letter-spacing: 1px;
    margin-bottom: 14px; padding-bottom: 8px; border-bottom: 1px solid var(--border);
  }
  .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 22px; }
  .detail-field-label { font-size: 12px; font-weight: 600; color: var(--text-muted); margin-bottom: 4px; }
  .detail-field-value { font-size: 16px; font-weight: 500; color: var(--text-primary); }
  .detail-field-value.mono { font-family: 'JetBrains Mono', monospace; font-size: 14px; }
  .detail-note {
    background: var(--warning-light);
    border-left: 3px solid var(--warning);
    border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
    padding: 12px 16px;
    margin-top: 4px;
    font-size: 15px;
    color: var(--text-primary);
    line-height: 1.6;
  }
  .detail-note-empty { color: var(--text-muted); font-size: 14px; font-style: italic; }
  /* EMPTY STATE */
  .empty-state { padding: 60px 20px; text-align: center; color: var(--text-muted); }
  .empty-state-icon { font-size: 40px; margin-bottom: 12px; opacity: 0.4; }
  .empty-state-text { font-size: 15px; }
  /* DELETE CONFIRM MODAL */
  .confirm-modal { max-width: 420px; }
  .confirm-body { padding: 28px 26px; text-align: center; }
  .confirm-icon {
    width: 56px; height: 56px;
    background: var(--danger-light);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 16px;
    color: var(--danger);
  }
  .confirm-title { font-size: 17px; font-weight: 700; color: var(--text-primary); margin-bottom: 8px; }
  .confirm-desc { font-size: 14px; color: var(--text-secondary); line-height: 1.6; }
  .confirm-count {
    display: inline-block;
    background: var(--danger-light);
    color: var(--danger);
    font-weight: 700;
    font-family: 'JetBrains Mono', monospace;
    padding: 2px 8px;
    border-radius: 4px;
    margin: 0 2px;
  }
  /* EXCEL UPLOAD MODAL */
  .upload-modal { max-width: 820px; }
  .drop-zone {
    border: 2px dashed var(--border2);
    border-radius: var(--radius);
    padding: 36px 20px;
    text-align: center;
    cursor: pointer;
    transition: all 0.18s;
    background: var(--surface2);
    margin-bottom: 20px;
  }
  .drop-zone:hover, .drop-zone.drag-over { border-color: var(--accent); background: var(--accent-light); }
  .drop-zone-icon { color: var(--text-muted); margin-bottom: 10px; }
  .drop-zone-title { font-size: 15px; font-weight: 600; color: var(--text-secondary); margin-bottom: 4px; }
  .drop-zone-sub { font-size: 13px; color: var(--text-muted); }
  .drop-zone-accent { color: var(--accent); font-weight: 600; }
  /* MAPPING TABLE */
  .mapping-section { margin-bottom: 20px; }
  .mapping-title {
    font-size: 12px; font-weight: 700; color: var(--text-muted);
    text-transform: uppercase; letter-spacing: 0.8px;
    margin-bottom: 10px; padding-bottom: 8px; border-bottom: 1px solid var(--border);
  }
  .mapping-grid { display: grid; grid-template-columns: 1fr 20px 1fr; gap: 8px 6px; align-items: center; }
  .mapping-label { font-size: 13px; font-weight: 600; color: var(--text-secondary); }
  .mapping-arrow { text-align: center; color: var(--text-muted); font-size: 14px; }
  .mapping-select {
    padding: 7px 10px;
    border: 1px solid var(--border2);
    border-radius: var(--radius-sm);
    font-size: 13px;
    font-family: 'Noto Sans KR', sans-serif;
    color: var(--text-primary);
    background: var(--surface2);
    outline: none;
    cursor: pointer;
  }
  .mapping-select:focus { border-color: var(--accent); }
  /* PREVIEW TABLE */
  .preview-section { margin-bottom: 4px; }
  .preview-scroll { max-height: 260px; overflow-y: auto; overflow-x: auto; border: 1px solid var(--border); border-radius: var(--radius-sm); }
  .preview-table { width: 100%; border-collapse: collapse; font-size: 12px; }
  .preview-table th {
    background: var(--surface2); padding: 8px 10px;
    text-align: left; font-weight: 700; color: var(--text-muted);
    text-transform: uppercase; letter-spacing: 0.5px;
    border-bottom: 2px solid var(--border2); white-space: nowrap; position: sticky; top: 0;
  }
  .preview-table td { padding: 7px 10px; border-bottom: 1px solid var(--border); vertical-align: middle; white-space: nowrap; }
  .preview-table tr.row-new td { background: #f0fff4; }
  .preview-table tr.row-new:hover td { background: #dcffe8; }
  .preview-row-tag {
    display: inline-block; padding: 2px 8px; border-radius: 10px;
    font-size: 11px; font-weight: 700;
  }
  .tag-new { background: var(--success-light); color: var(--success); }
  .preview-empty { padding: 30px; text-align: center; color: var(--text-muted); font-size: 14px; }
  .preview-count { font-size: 13px; color: var(--text-secondary); margin-bottom: 8px; }
  .preview-count strong { color: var(--success); }
  /* TOAST */
  .toast {
    position: fixed;
    bottom: 28px; right: 28px;
    background: var(--text-primary);
    color: #fff;
    padding: 12px 20px;
    border-radius: var(--radius-sm);
    font-size: 14px;
    font-weight: 500;
    box-shadow: var(--shadow-lg);
    z-index: 9999;
    transform: translateY(20px);
    opacity: 0;
    transition: all 0.25s;
    pointer-events: none;
  }
  .toast.show { transform: translateY(0); opacity: 1; }
  .toast.toast-success { background: var(--success); }
  /* RESPONSIVE */
  @media (max-width: 900px) {
    .stats-grid { grid-template-columns: repeat(3, 1fr); }
    .main { padding: 16px; }
  }
  @media (max-width: 600px) {
    .stats-grid { grid-template-columns: repeat(2, 1fr); }
    .header { padding: 0 16px; }
    .detail-grid { grid-template-columns: 1fr; }
  }
  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }
</style>
</head>
<body>

<!-- HEADER -->
<header class="header">
  <div class="header-logo">
    <span class="header-logo-badge">VRB</span>
    <span class="header-title">프로젝트 현황 관리</span>
  </div>
  <span class="header-date" id="headerDate"></span>
</header>

<!-- MAIN -->
<div class="main">
  <!-- STATS -->
  <div class="stats-grid" id="statsGrid"></div>

  <!-- TOOLBAR -->
  <div class="toolbar">
    <div class="search-wrap">
      <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input class="search-input" id="searchInput" type="text" placeholder="프로젝트 코드, 프로젝트명, 고객사 검색...">
    </div>
    <select class="filter-select" id="filterStatus">
      <option value="">전체 상태</option>
      <option value="가결">가결</option>
      <option value="조건부">조건부</option>
      <option value="보류">보류</option>
      <option value="부결">부결</option>
      <option value="미정">미정</option>
    </select>
    <select class="filter-select" id="filterReview">
      <option value="">전체 검토구분</option>
      <option value="사전">사전</option>
      <option value="제안">제안</option>
    </select>
    <select class="filter-select" id="filterSales">
      <option value="">전체 담당영업</option>
    </select>
    <button class="btn btn-success" onclick="exportExcel()">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      엑셀 내보내기

    { id:36, code:'SI-26-026', name:'원자력안전위원회 방사선 모니터링 시스템', client:'원자력안전위원회', review:'제안', date:'2026-04-04', sales:'정현철 이사', result:'조건부', status:'조건부', note:'기술 검증 추가 필요' },
    { id:37, code:'SI-26-027', name:'공정거래위원회 심사정보 디지털화', client:'공정거래위원회', review:'사전', date:'2026-04-11', sales:'윤성동 전무', result:'-', status:'미정', note:'' },
    { id:38, code:'SI-26-028', name:'감사원 감사정보 통합관리 플랫폼', client:'감사원', review:'사전', date:'2026-04-11', sales:'권혁주 상무', result:'-', status:'미정', note:'' },
  ];

  let editingId = null;
  let activeStatusFilter = '';

  // ── SORT STATE ────────────────────────────────────────────
  let sortCol = null;
  let sortDir = 'asc';

  const COLUMNS = [
    { key: 'review',  label: '검토구분' },
    { key: 'date',    label: '검토일자' },
    { key: 'code',    label: '프로젝트 코드' },
    { key: 'name',    label: '프로젝트명' },
    { key: 'client',  label: '고객사' },
    { key: 'sales',   label: '담당영업' },
    { key: 'result',  label: '검토결과' },
    { key: 'status',  label: '현재상태' },
    { key: 'note',    label: '비고' },
    { key: null,      label: '관리' },
  ];

  // ── INIT ──────────────────────────────────────────────────
  function init() {
    document.getElementById('headerDate').textContent = new Date().toLocaleDateString('ko-KR', {year:'numeric',month:'long',day:'numeric',weekday:'short'});
    populateSalesFilter();
    renderStats();
    renderThead();
    renderTable();
  }

  function populateSalesFilter() {
    const sales = [...new Set(projects.map(p => p.sales))].sort();
    const sel = document.getElementById('filterSales');
    sel.innerHTML = '<option value="">전체 담당영업</option>';
    sales.forEach(s => {
      const o = document.createElement('option'); o.value = s; o.textContent = s; sel.appendChild(o);
    });
  }

  // ── STATS ─────────────────────────────────────────────────
  function renderStats() {
    const counts = { '전체': projects.length, '가결': 0, '조건부': 0, '보류': 0, '부결': 0, '미정': 0 };
    projects.forEach(p => { if (counts[p.status] !== undefined) counts[p.status]++; });
    const grid = document.getElementById('statsGrid');
    grid.innerHTML = '';
    Object.entries(counts).forEach(([label, val]) => {
      const card = document.createElement('div');
      card.className = 'stat-card' + (activeStatusFilter === (label === '전체' ? '' : label) ? ' active' : '');
      card.innerHTML = '<div class="stat-label">' + label + '</div><div class="stat-value">' + val + '</div>';
      card.onclick = () => {
        activeStatusFilter = label === '전체' ? '' : label;
        document.getElementById('filterStatus').value = activeStatusFilter;
        renderStats();
        renderTable();
      };
      grid.appendChild(card);
    });
  }

  // ── THEAD ─────────────────────────────────────────────────
  function renderThead() {
    const thead = document.getElementById('tableHead');
    const tr = document.createElement('tr');
    COLUMNS.forEach(col => {
      const th = document.createElement('th');
      if (col.key) {
        th.className = 'sortable' + (sortCol === col.key ? (' sort-active sort-' + sortDir) : '');
        th.innerHTML = col.label + '<span class="sort-icon"><span class="arrow-up"></span><span class="arrow-down"></span></span>';
        th.onclick = () => handleSort(col.key);
      } else {
        th.textContent = col.label;
      }
      tr.appendChild(th);
    });
    thead.innerHTML = '';
    thead.appendChild(tr);
  }

  function handleSort(key) {
    if (sortCol === key) { sortDir = sortDir === 'asc' ? 'desc' : 'asc'; }
    else { sortCol = key; sortDir = 'asc'; }
    renderThead();
    renderTable();
  }

  function applySorting(list) {
    if (!sortCol) return list;
    return [...list].sort((a, b) => {
      let av = a[sortCol] || ''; let bv = b[sortCol] || '';
      if (sortCol === 'date') {
        av = av.replace(/-/g, ''); bv = bv.replace(/-/g, '');
        return sortDir === 'asc' ? av.localeCompare(bv) : bv.localeCompare(av);
      }
      const an = parseFloat(av); const bn = parseFloat(bv);
      if (!isNaN(an) && !isNaN(bn)) return sortDir === 'asc' ? an - bn : bn - an;
      return sortDir === 'asc' ? av.localeCompare(bv, 'ko') : bv.localeCompare(av, 'ko');
    });
  }

  // ── TABLE ─────────────────────────────────────────────────
  function getFiltered() {
    const q = document.getElementById('searchInput').value.toLowerCase();
    const status = document.getElementById('filterStatus').value;
    const review = document.getElementById('filterReview').value;
    const sales = document.getElementById('filterSales').value;
    return projects.filter(p => {
      const matchQ = !q || p.code.toLowerCase().includes(q) || p.name.toLowerCase().includes(q) || (p.client||'').toLowerCase().includes(q);
      const matchS = !status || p.status === status;
      const matchR = !review || p.review === review;
      const matchSales = !sales || p.sales === sales;
      return matchQ && matchS && matchR && matchSales;
    });
  }

  function renderTable() {
    const filtered = applySorting(getFiltered());
    document.getElementById('countDisplay').textContent = filtered.length;
    const tbody = document.getElementById('tableBody');
    if (filtered.length === 0) {
      tbody.innerHTML = '<tr><td colspan="10"><div class="empty-state"><div class="empty-state-icon">--</div><div class="empty-state-text">검색 결과가 없습니다.</div></div></td></tr>';
      return;
    }
    tbody.innerHTML = filtered.map(p => `
      <tr>
        <td><span class="badge badge-${p.review}">${p.review}</span></td>
        <td><span class="date-text">${formatDate(p.date)}</span></td>
        <td><span class="code-badge" onclick="openDetailModal(${p.id})">${p.code}</span></td>
        <td><span class="project-name-link" onclick="openDetailModal(${p.id})">${p.name}</span></td>
        <td>${p.client || '-'}</td>
        <td>${p.sales}</td>
        <td><span class="badge badge-${p.result}">${p.result}</span></td>
        <td><span class="badge badge-${p.status}">${p.status}</span></td>
        <td style="max-width:180px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text-secondary)">${p.note || '-'}</td>
        <td><button class="action-btn action-edit" onclick="openEditModal(${p.id})">수정</button></td>
      </tr>
    `).join('');
  }

  function formatDate(d) {
    if (!d) return '-';
    const parts = d.split('-');
    if (parts.length === 3) return parts[0] + '.' + parts[1] + '.' + parts[2];
    return d;
  }

  // ── DETAIL MODAL ──────────────────────────────────────────
  function openDetailModal(id) {
    const p = projects.find(x => x.id === id);
    if (!p) return;
    document.getElementById('d_review').innerHTML = '<span class="badge badge-' + p.review + '">' + p.review + '</span>';
    document.getElementById('d_date').textContent = formatDate(p.date);
    document.getElementById('d_code').textContent = p.code;
    document.getElementById('d_name').textContent = p.name;
    document.getElementById('d_client').textContent = p.client || '-';
    document.getElementById('d_sales').textContent = p.sales;
    document.getElementById('d_result').innerHTML = '<span class="badge badge-' + p.result + '">' + p.result + '</span>';
    document.getElementById('d_status').innerHTML = '<span class="badge badge-' + p.status + '">' + p.status + '</span>';
    document.getElementById('d_badges').innerHTML =
      '<span class="detail-hero-badge">' + p.review + '</span>' +
      '<span class="detail-hero-badge">' + p.status + '</span>' +
      (p.result !== '-' ? '<span class="detail-hero-badge">' + p.result + '</span>' : '');
    const noteWrap = document.getElementById('d_note_wrap');
    noteWrap.innerHTML = p.note
      ? '<div class="detail-note">' + p.note + '</div>'
      : '<div class="detail-note-empty">비고 사항 없음</div>';
    document.getElementById('d_editBtn').onclick = () => { closeDetailModal(); openEditModal(id); };
    document.getElementById('detailModal').classList.add('open');
  }
  function closeDetailModal() { document.getElementById('detailModal').classList.remove('open'); }
  function closeDetailModalOutside(e) { if (e.target === document.getElementById('detailModal')) closeDetailModal(); }

  // ── FORM MODAL ────────────────────────────────────────────
  function openAddModal() {
    editingId = null;
    document.getElementById('formModalTitle').textContent = '신규 등록';
    document.getElementById('f_code').value = '';
    document.getElementById('f_name').value = '';
    document.getElementById('f_client').value = '';
    document.getElementById('f_review').value = '사전';
    document.getElementById('f_date').value = '';
    document.getElementById('f_sales').value = '';
    document.getElementById('f_result').value = '-';
    document.getElementById('f_status').value = '미정';

    document.getElementById('formModal').classList.add('open');
  }
  function openEditModal(id) {
    const p = projects.find(x => x.id === id);
    if (!p) return;
    editingId = id;
    document.getElementById('formModalTitle').textContent = '프로젝트 수정';
    document.getElementById('f_code').value = p.code;
    document.getElementById('f_name').value = p.name;
    document.getElementById('f_client').value = p.client || '';
    document.getElementById('f_review').value = p.review;
    document.getElementById('f_date').value = p.date || '';
    document.getElementById('f_sales').value = p.sales;
    document.getElementById('f_result').value = p.result;
    document.getElementById('f_status').value = p.status;
    document.getElementById('f_note').value = p.note;
    document.getElementById('formModal').classList.add('open');

  function closeFormModal() { document.getElementById('formModal').classList.remove('open'); }
  function closeFormModalOutside(e) { if (e.target === document.getElementById('formModal')) closeFormModal(); }

  function saveProject() {
    const data = {
      code: document.getElementById('f_code').value.trim(),
      name: document.getElementById('f_name').value.trim(),
      client: document.getElementById('f_client').value.trim(),
      review: document.getElementById('f_review').value,
      date: document.getElementById('f_date').value,
      sales: document.getElementById('f_sales').value.trim(),
      result: document.getElementById('f_result').value,
      status: document.getElementById('f_status').value,
      note: document.getElementById('f_note').value.trim(),
    };
    if (!data.code || !data.name) { alert('프로젝트 코드와 프로젝트명은 필수입니다.'); return; }
    if (editingId) {
      const idx = projects.findIndex(x => x.id === editingId);
      projects[idx] = { ...projects[idx], ...data };
    } else {
      projects.push({ id: Date.now(), ...data });
    }
    closeFormModal();
    renderStats();
    renderTable();
  }

  // ── EXCEL EXPORT ──────────────────────────────────────────
  function exportExcel() {
    const filtered = getFiltered();
    const rows = filtered.map(p => ({
      '프로젝트 코드': p.code,
      '프로젝트명': p.name,
      '고객사': p.client || '',
      '검토구분': p.review,
      '검토일자': p.date || '',
      '담당영업사원': p.sales,
      '검토결과': p.result,
      '현재상태': p.status,
      '비고': p.note,
    }));
    const ws = XLSX.utils.json_to_sheet(rows);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, 'VRB 프로젝트 현황');
    XLSX.writeFile(wb, 'VRB_프로젝트현황_' + new Date().toISOString().slice(0,10) + '.xlsx');
  }

  function openDeleteAllModal() {

    document.getElementById('deleteAllModal').classList.add('open');

  function closeDeleteAllModal() { document.getElementById('deleteAllModal').classList.remove('open'); }
  function closeDeleteAllModalOutside(e) { if (e.target === document.getElementById('deleteAllModal')) closeDeleteAllModal(); }
  function confirmDeleteAll() {
    projects = [];
    closeDeleteAllModal();
    renderStats();
    renderTable();
    populateSalesFilter();
    showToast('전체 프로젝트가 삭제되었습니다.', 'danger');
  }

  // ── EXCEL UPLOAD ──────────────────────────────────────────
  let uploadedRows = [];
  let excelHeaders = [];

  const FIELD_DEFS = [
    { key: 'code',   label: '프로젝트 코드', required: true },
    { key: 'name',   label: '프로젝트명',    required: true },
    { key: 'client', label: '고객사',        required: false },
    { key: 'review', label: '검토구분',      required: false },
    { key: 'date',   label: '검토일자',      required: false },
    { key: 'sales',  label: '담당영업',      required: false },
    { key: 'result', label: '검토결과',      required: false },
    { key: 'status', label: '현재상태',      required: false },
    { key: 'note',   label: '비고',          required: false },
  ];

  // Auto-match keywords for each field
  const FIELD_KEYWORDS = {
    code:   ['코드', 'code'],
    name:   ['프로젝트명', '사업명', 'name'],
    client: ['고객사', '발주처', 'client'],
    review: ['검토구분', '구분', 'vrb', 'review'],
    date:   ['검토일자', '일자', '날짜', 'date'],
    sales:  ['담당영업', '영업', '담당', 'sales'],
    result: ['검토결과', '결과', 'result'],
    status: ['현재상태', '상태', 'status'],
    note:   ['비고', '메모', 'note', 'remark'],
  };

  function openUploadModal() {
    uploadedRows = [];
    excelHeaders = [];
    document.getElementById('mappingSection').style.display = 'none';
    document.getElementById('previewSection').style.display = 'none';
    document.getElementById('uploadSaveBtn').style.display = 'none';
    document.getElementById('excelFileInput').value = '';
    document.getElementById('uploadModal').classList.add('open');
  }
  function closeUploadModal() { document.getElementById('uploadModal').classList.remove('open'); }
  function closeUploadModalOutside(e) { if (e.target === document.getElementById('uploadModal')) closeUploadModal(); }

  // Drag & Drop
  const dropZone = document.getElementById('dropZone');
  dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
  dropZone.addEventListener('drop', e => {
    e.preventDefault();
    dropZone.classList.remove('drag-over');
    const file = e.dataTransfer.files[0];
    if (file) processExcelFile(file);
  });

  function handleFileSelect(e) {
    const file = e.target.files[0];
    if (file) processExcelFile(file);
  }

  function processExcelFile(file) {
    const reader = new FileReader();
    reader.onload = function(e) {
      try {
        const wb = XLSX.read(e.target.result, { type: 'array' });
        const ws = wb.Sheets[wb.SheetNames[0]];
        const data = XLSX.utils.sheet_to_json(ws, { header: 1, defval: '' });
        if (data.length < 2) { showToast('데이터가 없는 파일입니다.', ''); return; }
        excelHeaders = data[0].map(h => String(h).trim());
        uploadedRows = data.slice(1).filter(row => row.some(cell => cell !== ''));
        renderMappingUI();
      } catch(err) {
        showToast('파일을 읽는 중 오류가 발생했습니다.', '');
      }
    };
    reader.readAsArrayBuffer(file);
  }

  function autoDetectMapping() {
    const mapping = {};
    FIELD_DEFS.forEach(f => {
      const kws = FIELD_KEYWORDS[f.key] || [];
      const matched = excelHeaders.findIndex(h =>
        kws.some(kw => h.toLowerCase().includes(kw.toLowerCase()))
      );
      mapping[f.key] = matched >= 0 ? String(matched) : '';
    });
    return mapping;
  }

  function renderMappingUI() {
    const mapping = autoDetectMapping();
    const grid = document.getElementById('mappingGrid');
    grid.innerHTML = '';
    FIELD_DEFS.forEach(f => {
      const label = document.createElement('div');
      label.className = 'mapping-label';
      label.textContent = f.label + (f.required ? ' *' : '');

      const arrow = document.createElement('div');
      arrow.className = 'mapping-arrow';
      arrow.textContent = '>';

      const sel = document.createElement('select');
      sel.className = 'mapping-select';
      sel.id = 'map_' + f.key;
      sel.innerHTML = '<option value="">-- 선택 안함 --</option>' +
        excelHeaders.map((h, i) => `<option value="${i}" ${mapping[f.key] === String(i) ? 'selected' : ''}>${h}</option>`).join('');
      sel.onchange = renderPreview;

      grid.appendChild(label);
      grid.appendChild(arrow);
      grid.appendChild(sel);
    });
    document.getElementById('mappingSection').style.display = 'block';
    renderPreview();
  }

  function getCurrentMapping() {
    const m = {};
    FIELD_DEFS.forEach(f => {
      const sel = document.getElementById('map_' + f.key);
      m[f.key] = sel && sel.value !== '' ? parseInt(sel.value) : null;
    });
    return m;
  }

  function parseDate(val) {
    if (!val) return '';
    const s = String(val).trim();
    // Excel serial number
    if (/^\d{4,5}$/.test(s)) {
      const d = XLSX.SSF.parse_date_code(parseInt(s));
      if (d) return String(d.y) + '-' + String(d.m).padStart(2,'0') + '-' + String(d.d).padStart(2,'0');
    }
    // YYYY-MM-DD or YYYY.MM.DD
    const m = s.match(/(\d{4})[-./](\d{1,2})[-./](\d{1,2})/);
    if (m) return m[1] + '-' + m[2].padStart(2,'0') + '-' + m[3].padStart(2,'0');
    return s;
  }

  function rowToProject(row, mapping) {
    const get = key => mapping[key] !== null ? String(row[mapping[key]] || '').trim() : '';
    return {
      code:   get('code'),
      name:   get('name'),
      client: get('client'),
      review: get('review') || '사전',
      date:   parseDate(get('date')),
      sales:  get('sales'),
      result: get('result') || '-',
      status: get('status') || '미정',
      note:   get('note'),
    };
  }

  function renderPreview() {
    const mapping = getCurrentMapping();
    const parsed = uploadedRows.map(row => rowToProject(row, mapping));
    const section = document.getElementById('previewSection');
    const head = document.getElementById('previewHead');
    const body = document.getElementById('previewBody');
    const countEl = document.getElementById('previewCount');

    if (parsed.length === 0) { section.style.display = 'none'; document.getElementById('uploadSaveBtn').style.display = 'none'; return; }

    const cols = ['code','name','client','review','date','sales','result','status','note'];
    const labels = { code:'코드', name:'프로젝트명', client:'고객사', review:'검토구분', date:'검토일자', sales:'담당영업', result:'검토결과', status:'현재상태', note:'비고' };

    head.innerHTML = '<tr>' + cols.map(c => '<th>' + labels[c] + '</th>').join('') + '</tr>';
    body.innerHTML = parsed.map(p =>
      '<tr class="row-new">' + cols.map(c => '<td>' + (p[c] || '-') + '</td>').join('') + '</tr>'
    ).join('');

    countEl.innerHTML = '신규 추가 <strong>' + parsed.length + '건</strong>';
    section.style.display = 'block';
    document.getElementById('uploadSaveBtn').style.display = 'inline-flex';
  }

  function saveUploadedData() {
    const mapping = getCurrentMapping();
    if (!mapping.code && mapping.code !== 0) { showToast('프로젝트 코드 컬럼을 매핑해주세요.', ''); return; }
    if (!mapping.name && mapping.name !== 0) { showToast('프로젝트명 컬럼을 매핑해주세요.', ''); return; }

    const parsed = uploadedRows.map(row => rowToProject(row, mapping)).filter(p => p.code && p.name);
    let addedCount = 0;

    // ★ 중복 체크 없이 무조건 신규 추가
    parsed.forEach(p => {
      projects.push({ id: Date.now() + Math.random(), ...p });
      addedCount++;
    });

    closeUploadModal();

    // ★ 핵심: 저장 완료 후 Stats + Table + SalesFilter 모두 갱신
    renderStats();
    renderTable();
    populateSalesFilter();

    showToast(addedCount + '건이 추가되었습니다.', 'success');
  }

  // ── TOAST ─────────────────────────────────────────────────
  function showToast(msg, type) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast' + (type === 'success' ? ' toast-success' : '') + ' show';
    setTimeout(() => { t.classList.remove('show'); }, 3000);
  }

  // ── EVENT LISTENERS ───────────────────────────────────────
  document.getElementById('searchInput').addEventListener('input', renderTable);
  document.getElementById('filterStatus').addEventListener('change', function() {
    activeStatusFilter = this.value;
    renderStats();
    renderTable();
  });
  document.getElementById('filterReview').addEventListener('change', renderTable);

  init();
