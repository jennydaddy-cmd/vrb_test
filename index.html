<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>UCUBE VRB 관리시스템 - 로그인</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f4f7f9; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-container { background: #fff; padding: 40px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 350px; }
        h2 { color: #0056b3; text-align: center; margin-bottom: 30px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; color: #666; }
        input[type="text"], input[type="password"] { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }
        .options { display: flex; align-items: center; font-size: 0.9em; color: #666; margin-top: 10px; }
        button { width: 100%; padding: 12px; background-color: #0056b3; border: none; color: white; border-radius: 4px; cursor: pointer; margin-top: 20px; font-size: 16px; }
        button:hover { background-color: #004494; }
    </style>
</head>
<body>

<div class="login-container">
    <h2>UCUBE VRB Management System</h2>
    <form id="loginForm">
        <div class="form-group">
            <label for="userId">아이디</label>
            <input type="text" id="userId" required>
        </div>
        <div class="form-group">
            <label for="userPw">비밀번호</label>
            <input type="password" id="userPw" required>
        </div>
        <div class="options">
            <input type="checkbox" id="saveId"> <label for="saveId">아이디 저장</label>
        </div>
        <button type="submit">로그인</button>
    </form>
</div>

<script src="login_logic.js"></script>
</body>
</html>
